version: "2"

run:
  timeout: 3m

linters:
  default: standard

  enable:
    # Correctness and bug finding
    - bodyclose
    - durationcheck
    - errchkjson
    - errorlint
    - gosec
    - nilerr
    - nilnesserr
    - wastedassign

    # Maintainability and common hygiene
    - asasalint
    - bidichk
    - gocritic
    - makezero
    - misspell
    - nolintlint
    - prealloc
    - reassign
    - revive
    - unconvert
    - usestdlibvars
    - whitespace
    - wsl_v5

  settings:
    govet:
      enable:
        - shadow

    wsl_v5:
      case-max-lines: 3
      default: default
      disable:
        - decl

  exclusions:
    generated: strict
    paths:
      - '(^|/)examples_test\.go$'
    rules:
      - path: "_test(_[^/]+)?\\.go"
        linters:
          - errcheck
      # A file descriptor from os.Stdout.Fd() always fits in an int.
      - path: 'terminal(_test)?\.go'
        text: "G115"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
